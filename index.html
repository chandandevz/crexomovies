<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Obesession (2026) — Download</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --card:     #1a1a26;
    --border:   rgba(255,255,255,.07);
    --gold:     #f5c518;
    --gold-dim: #b8941a;
    --blue:     #4fc3f7;
    --green:    #00e676;
    --red:      #ff5252;
    --text:     #e8e8f0;
    --muted:    #6b6b85;
    --display:  'Bebas Neue', sans-serif;
    --body:     'Inter', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* banner code */
  .banner-design{
    width: 100%;
    overflow: hidden;
  }

  /* ── HERO BACKDROP ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 0 0 3rem;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=1800&auto=format&fit=crop&q=80')
      center/cover no-repeat;
    filter: brightness(.35) saturate(1.2);
    transform: scale(1.04);
    animation: slow-zoom 18s ease-in-out infinite alternate;
  }
  @keyframes slow-zoom {
    from { transform: scale(1.04); }
    to   { transform: scale(1.12); }
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top, var(--bg) 0%, rgba(10,10,15,.6) 40%, transparent 80%),
      linear-gradient(to right, rgba(10,10,15,.9) 0%, transparent 60%);
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(10,10,15,.9), transparent);
    backdrop-filter: blur(4px);
  }
  .nav-logo {
    font-family: var(--display);
    font-size: 1.6rem;
    color: var(--gold);
    letter-spacing: .08em;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a {
    font-size: .8rem;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: .06em;
    text-transform: uppercase;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--text); }

  /* ── HERO CONTENT ── */
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    width: 100%;
  }
  .genre-tags { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: .25rem .7rem;
    border-radius: 2rem;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
  }
  .tag.highlight { border-color: var(--gold); color: var(--gold); }

  .movie-title {
    font-family: var(--display);
    font-size: clamp(3.5rem, 10vw, 7rem);
    line-height: .95;
    letter-spacing: .03em;
    color: #fff;
    margin-bottom: .4rem;
  }
  .movie-year {
    font-family: var(--display);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: var(--gold);
    letter-spacing: .12em;
    margin-bottom: 1rem;
  }

  .meta-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: .6rem 1.2rem;
    margin-bottom: 1.4rem;
  }
  .imdb-badge {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    background: var(--gold);
    color: #000;
    font-size: .78rem;
    font-weight: 800;
    padding: .3rem .65rem;
    border-radius: .3rem;
  }
  .meta-item {
    font-size: .8rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: .35rem;
  }
  .meta-item::before {
    content: '•';
    color: rgba(255,255,255,.2);
    display: none;
  }
  .meta-item + .meta-item::before { display: inline; }

  .synopsis {
    font-size: .95rem;
    line-height: 1.75;
    color: rgba(232,232,240,.75);
    max-width: 560px;
    margin-bottom: 2rem;
  }

  /* ── DOWNLOAD SECTION ── */
  .download-box {
    background: rgba(26,26,38,.75);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.6rem;
    backdrop-filter: blur(18px);
    max-width: 580px;
  }
  .download-box h3 {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .quality-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .75rem;
    margin-bottom: 1rem;
  }

  .q-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .3rem;
    padding: .9rem .5rem;
    border-radius: .75rem;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,.03);
    cursor: pointer;
    transition: all .22s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    font-family: var(--body);
  }
  .q-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity .2s;
  }
  .q-btn:hover { transform: translateY(-2px); }
  .q-btn:active { transform: translateY(0) scale(.97); }

  /* 480p — standard */
  .q-480 { border-color: rgba(107,107,133,.4); }
  .q-480::before { background: linear-gradient(135deg, rgba(107,107,133,.15), transparent); }
  .q-480:hover { border-color: #6b6b85; box-shadow: 0 4px 20px rgba(107,107,133,.25); }
  .q-480:hover::before { opacity: 1; }

  /* 720p — HD blue */
  .q-720 { border-color: rgba(79,195,247,.35); }
  .q-720::before { background: linear-gradient(135deg, rgba(79,195,247,.12), transparent); }
  .q-720:hover { border-color: var(--blue); box-shadow: 0 4px 24px rgba(79,195,247,.3); }
  .q-720:hover::before { opacity: 1; }

  /* 1080p — gold FHD */
  .q-1080 { border-color: rgba(245,197,24,.35); }
  .q-1080::before { background: linear-gradient(135deg, rgba(245,197,24,.12), transparent); }
  .q-1080:hover { border-color: var(--gold); box-shadow: 0 4px 28px rgba(245,197,24,.35); }
  .q-1080:hover::before { opacity: 1; }

  .q-label {
    font-family: var(--display);
    font-size: 1.6rem;
    line-height: 1;
    letter-spacing: .05em;
  }
  .q-480 .q-label { color: #9090aa; }
  .q-720 .q-label { color: var(--blue); }
  .q-1080 .q-label { color: var(--gold); }

  .q-badge {
    font-size: .58rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .18rem .5rem;
    border-radius: 2rem;
  }
  .q-480 .q-badge { background: rgba(107,107,133,.2); color: #9090aa; }
  .q-720 .q-badge { background: rgba(79,195,247,.15); color: var(--blue); }
  .q-1080 .q-badge { background: rgba(245,197,24,.15); color: var(--gold); }

  .q-size { font-size: .72rem; color: var(--muted); }

  .q-dl-icon {
    position: absolute;
    bottom: .45rem; right: .55rem;
    font-size: .65rem;
    color: rgba(255,255,255,.2);
  }

  /* BEST VALUE badge on 1080p */
  .best-badge {
    position: absolute;
    top: -.1rem; right: -.1rem;
    background: var(--gold);
    color: #000;
    font-size: .52rem;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .2rem .45rem;
    border-radius: 0 .75rem 0 .45rem;
  }

  /* ── PROGRESS MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,.85);
    backdrop-filter: blur(12px);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1.2rem;
    padding: 2.2rem 2rem;
    width: min(420px, 90vw);
    text-align: center;
    transform: scale(.92) translateY(20px);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.show .modal { transform: scale(1) translateY(0); }

  .modal-icon { font-size: 3rem; margin-bottom: 1rem; }
  .modal h2 { font-family: var(--display); font-size: 2rem; letter-spacing: .06em; margin-bottom: .4rem; }
  .modal-quality { color: var(--gold); }
  .modal-sub { font-size: .85rem; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.6; }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,.08);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: .5rem;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width .25s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,.4));
    animation: shimmer .9s linear infinite;
  }
  @keyframes shimmer { from { opacity: 0; } 50% { opacity: 1; } to { opacity: 0; } }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: .75rem;
    color: var(--muted);
    margin-bottom: 1.8rem;
  }
  .progress-pct { color: var(--text); font-weight: 600; }

  .modal-btn {
    display: inline-block;
    padding: .75rem 2rem;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: .6rem;
    font-family: var(--body);
    font-size: .85rem;
    cursor: pointer;
    transition: all .2s;
  }
  .modal-btn:hover { border-color: var(--red); color: var(--red); }

  .done-actions { display: none; flex-direction: column; gap: .75rem; margin-bottom: 1rem; }
  .done-actions.show { display: flex; }
  .btn-save {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .85rem 1.5rem;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: .65rem;
    font-family: var(--body);
    font-size: .92rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }
  .btn-save:hover { background: #33ff8a; transform: translateY(-1px); }
  .btn-close-done {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: .65rem;
    border-radius: .65rem;
    font-family: var(--body);
    font-size: .82rem;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-close-done:hover { border-color: var(--muted); color: var(--text); }

  /* ── DETAILS SECTION ── */
  .details-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 2rem;
  }

  .section-head {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    padding-bottom: .6rem;
    border-bottom: 1px solid var(--border);
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: .6rem;
    margin-bottom: 3rem;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: .65rem .9rem;
    border-radius: .5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    gap: 1rem;
  }
  .info-key { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0; }
  .info-val { font-size: .82rem; color: var(--text); font-weight: 500; text-align: right; }

  .quality-compare {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 3rem;
  }
  .compare-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: .9rem;
    padding: 1.4rem;
    transition: border-color .2s;
  }
  .compare-card:hover { border-color: rgba(255,255,255,.15); }
  .cc-quality {
    font-family: var(--display);
    font-size: 2rem;
    margin-bottom: .5rem;
  }
  .cc-480 { color: #9090aa; }
  .cc-720 { color: var(--blue); }
  .cc-1080 { color: var(--gold); }
  .cc-detail { font-size: .8rem; color: var(--muted); line-height: 1.65; }
  .cc-detail strong { color: var(--text); }

  /* ── SCREENSHOT STRIP ── */
  .screenshots {
    display: flex;
    gap: .75rem;
    overflow-x: auto;
    padding-bottom: .5rem;
    margin-bottom: 3rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .screenshots img {
    width: 220px;
    height: 124px;
    object-fit: cover;
    border-radius: .6rem;
    flex-shrink: 0;
    opacity: .8;
    transition: opacity .2s, transform .2s;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  a{
    text-decoration: none;
    color: #fff;
  }
  .screenshots img:hover { opacity: 1; transform: scale(1.03); }

  /* ── BOTTOM CTA ── */
  .bottom-cta {
    background: linear-gradient(135deg, #12121a, #1a1a26);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 2rem;
    text-align: center;
    margin-bottom: 3rem;
  }
  .bottom-cta h3 { font-family: var(--display); font-size: 2rem; margin-bottom: .5rem; letter-spacing: .05em; }
  .bottom-cta p { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .bottom-btns { display: flex; justify-content: center; flex-wrap: wrap; gap: .75rem; }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    padding: .75rem 1.5rem;
    border-radius: .65rem;
    font-family: var(--body);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    letter-spacing: .02em;
  }
  .dl-sd { background: rgba(107,107,133,.15); border: 1.5px solid rgba(107,107,133,.4); color: #9090aa; }
  .dl-sd:hover { background: rgba(107,107,133,.25); }
  .dl-hd { background: rgba(79,195,247,.12); border: 1.5px solid rgba(79,195,247,.4); color: var(--blue); }
  .dl-hd:hover { background: rgba(79,195,247,.2); }
  .dl-fhd { background: rgba(245,197,24,.12); border: 1.5px solid rgba(245,197,24,.4); color: var(--gold); }
  .dl-fhd:hover { background: rgba(245,197,24,.2); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: .75rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .nav-links { display: none; }
    .quality-grid { gap: .5rem; }
    .q-label { font-size: 1.3rem; }
    .download-box { padding: 1.2rem; }
    .modal { padding: 1.6rem 1.3rem; }
  }
</style>
